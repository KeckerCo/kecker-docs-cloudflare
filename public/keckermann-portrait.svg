<svg viewBox="0 0 360 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="portrait-title portrait-desc">
  <title id="portrait-title">Portrait of Bartholomäus Keckermann</title>
  <desc id="portrait-desc">A stylised engraving-style portrait of the scholar Bartholomäus Keckermann (1572–1609), shown in dark academic robes with a white ruff collar, after the conventions of late sixteenth-century Reformed portraiture.</desc>

  <defs>
    <!-- Parchment hatching texture -->
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(38)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#b5a090" stroke-width="0.35" opacity="0.45"/>
    </pattern>
    <!-- Cross-hatch for shadow areas -->
    <pattern id="cross-hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#6a4e38" stroke-width="0.4" opacity="0.3"/>
      <line x1="0" y1="0" x2="4" y2="0" stroke="#6a4e38" stroke-width="0.4" opacity="0.3"/>
    </pattern>
    <!-- Clip path for portrait oval -->
    <clipPath id="portrait-clip">
      <ellipse cx="180" cy="190" rx="127" ry="146"/>
    </clipPath>
  </defs>

  <!-- ── Outer frame background ─────────────────────────────────────── -->
  <rect width="360" height="460" fill="#f5ede2" rx="3"/>
  <rect width="360" height="460" fill="url(#hatch)" rx="3" opacity="0.5"/>

  <!-- ── Decorative border lines ────────────────────────────────────── -->
  <rect x="10" y="10" width="340" height="440" fill="none" stroke="#2a2a2a" stroke-width="1.2" rx="2"/>
  <rect x="16" y="16" width="328" height="428" fill="none" stroke="#c8b89e" stroke-width="0.5" rx="1"/>

  <!-- ── Corner ornaments in accent crimson ─────────────────────────── -->
  <!-- top-left -->
  <path d="M 10,38 L 10,10 L 38,10" fill="none" stroke="#971b2f" stroke-width="1.75" stroke-linecap="square"/>
  <!-- top-right -->
  <path d="M 322,10 L 350,10 L 350,38" fill="none" stroke="#971b2f" stroke-width="1.75" stroke-linecap="square"/>
  <!-- bottom-left -->
  <path d="M 10,422 L 10,450 L 38,450" fill="none" stroke="#971b2f" stroke-width="1.75" stroke-linecap="square"/>
  <!-- bottom-right -->
  <path d="M 322,450 L 350,450 L 350,422" fill="none" stroke="#971b2f" stroke-width="1.75" stroke-linecap="square"/>

  <!-- ── Portrait oval frame ────────────────────────────────────────── -->
  <!-- Oval shadow layer -->
  <ellipse cx="182" cy="192" rx="129" ry="148" fill="rgba(0,0,0,0.07)"/>
  <!-- Oval fill — slightly warmer than outer parchment -->
  <ellipse cx="180" cy="190" rx="127" ry="146" fill="#ede4d4"/>
  <ellipse cx="180" cy="190" rx="127" ry="146" fill="url(#hatch)" opacity="0.35"/>
  <!-- Oval outer border -->
  <ellipse cx="180" cy="190" rx="130" ry="149" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Oval inner border (double-line engraving convention) -->
  <ellipse cx="180" cy="190" rx="127" ry="146" fill="none" stroke="#2a2a2a" stroke-width="0.6"/>

  <!-- ═══════════════ FIGURE (clipped to oval) ════════════════════════ -->

  <!-- ── Academic robes / torso ────────────────────────────────────── -->
  <path d="M 44,336 L 42,302 Q 68,278 148,273 Q 164,271 180,271 Q 196,271 212,273 Q 292,278 318,302 L 316,336 Z"
        fill="#1a1208" clip-path="url(#portrait-clip)"/>
  <!-- Robe fold highlights — subtle lighter lines suggesting fabric -->
  <path d="M 120,295 Q 130,310 128,336" fill="none" stroke="#2e2218" stroke-width="0.8" clip-path="url(#portrait-clip)"/>
  <path d="M 152,281 Q 155,305 153,336" fill="none" stroke="#2e2218" stroke-width="0.7" clip-path="url(#portrait-clip)"/>
  <path d="M 208,281 Q 205,305 207,336" fill="none" stroke="#2e2218" stroke-width="0.7" clip-path="url(#portrait-clip)"/>
  <path d="M 240,295 Q 230,310 232,336" fill="none" stroke="#2e2218" stroke-width="0.8" clip-path="url(#portrait-clip)"/>

  <!-- ── Ruff collar ────────────────────────────────────────────────── -->
  <!-- Collar base ellipse -->
  <ellipse cx="180" cy="275" rx="65" ry="22" fill="#f0e8dc" clip-path="url(#portrait-clip)"/>
  <!-- Collar shadow on robe -->
  <ellipse cx="180" cy="283" rx="60" ry="14" fill="rgba(0,0,0,0.1)" clip-path="url(#portrait-clip)"/>
  <!-- Pleated upper edge — alternating peaks and valleys -->
  <polyline
    points="115,269 122,254 129,269 136,254 143,269 150,254 157,269 164,254 171,269 178,254 185,269 192,254 199,269 206,254 213,269 220,254 227,269 234,254 241,269 245,270"
    fill="none" stroke="#d8d0c4" stroke-width="1.2" stroke-linejoin="round" clip-path="url(#portrait-clip)"/>
  <!-- Pleat fold lines — suggesting the layered linen folds -->
  <polyline
    points="118,276 125,264 132,276 139,264 146,276 153,264 160,276 167,264 174,276 181,264 188,276 195,264 202,276 209,264 216,276 223,264 230,276 237,264 242,276"
    fill="none" stroke="#c8c0b4" stroke-width="0.7" stroke-linejoin="round" clip-path="url(#portrait-clip)"/>
  <!-- Collar dividing line (top of collar solid area) -->
  <path d="M 115,270 Q 150,258 180,256 Q 210,258 245,270" fill="none" stroke="#e0d8cc" stroke-width="0.5" clip-path="url(#portrait-clip)"/>

  <!-- ── Neck ───────────────────────────────────────────────────────── -->
  <path d="M 164,248 Q 162,260 164,268 Q 172,274 180,274 Q 188,274 196,268 Q 198,260 196,248 Q 188,252 180,252 Q 172,252 164,248 Z"
        fill="#c8916a" clip-path="url(#portrait-clip)"/>

  <!-- ── Face ───────────────────────────────────────────────────────── -->
  <ellipse cx="180" cy="182" rx="58" ry="68" fill="#d4a878"/>
  <!-- Cheek shading (bilateral — slightly warmer/darker on sides) -->
  <ellipse cx="135" cy="198" rx="22" ry="28" fill="#b87848" opacity="0.18" clip-path="url(#portrait-clip)"/>
  <ellipse cx="225" cy="198" rx="22" ry="28" fill="#b87848" opacity="0.18" clip-path="url(#portrait-clip)"/>
  <!-- Forehead lighter highlight -->
  <ellipse cx="180" cy="150" rx="32" ry="18" fill="#e0b882" opacity="0.4"/>

  <!-- ── Scholar's cap (period academic bonnet) ─────────────────────── -->
  <!-- Cap main body -->
  <ellipse cx="180" cy="125" rx="60" ry="24" fill="#1c1208"/>
  <!-- Cap crown — slightly domed top -->
  <ellipse cx="180" cy="114" rx="54" ry="22" fill="#252012"/>
  <!-- Cap brim shadow at edge -->
  <ellipse cx="180" cy="130" rx="62" ry="10" fill="#1a1008" opacity="0.6"/>
  <!-- Cap highlight (very subtle) -->
  <ellipse cx="172" cy="112" rx="20" ry="10" fill="#352818" opacity="0.4"/>

  <!-- Hair visible at sides, beneath cap -->
  <path d="M 120,132 Q 118,155 120,175 Q 122,188 125,200" fill="#1c1208" stroke="#1c1208" stroke-width="8" stroke-linecap="round" clip-path="url(#portrait-clip)"/>
  <path d="M 240,132 Q 242,155 240,175 Q 238,188 235,200" fill="#1c1208" stroke="#1c1208" stroke-width="8" stroke-linecap="round" clip-path="url(#portrait-clip)"/>

  <!-- ── Eyebrows ───────────────────────────────────────────────────── -->
  <path d="M 147,152 Q 160,145 172,151" fill="none" stroke="#2a1a10" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M 188,151 Q 200,145 213,152" fill="none" stroke="#2a1a10" stroke-width="2.2" stroke-linecap="round"/>

  <!-- ── Eyes ───────────────────────────────────────────────────────── -->
  <!-- Eye whites -->
  <ellipse cx="160" cy="166" rx="12" ry="7.5" fill="#f0e0c8"/>
  <ellipse cx="200" cy="166" rx="12" ry="7.5" fill="#f0e0c8"/>
  <!-- Eye lids / shadow above -->
  <path d="M 148,163 Q 160,156 172,163" fill="#c88858" opacity="0.4"/>
  <path d="M 188,163 Q 200,156 212,163" fill="#c88858" opacity="0.4"/>
  <!-- Iris -->
  <circle cx="160" cy="167" r="5.5" fill="#2a1810"/>
  <circle cx="200" cy="167" r="5.5" fill="#2a1810"/>
  <!-- Pupil highlight -->
  <circle cx="162" cy="165" r="1.5" fill="#5a3820" opacity="0.6"/>
  <circle cx="202" cy="165" r="1.5" fill="#5a3820" opacity="0.6"/>
  <!-- Lower lash line -->
  <path d="M 149,169 Q 160,174 171,169" fill="none" stroke="#a87848" stroke-width="0.8" opacity="0.5"/>
  <path d="M 189,169 Q 200,174 211,169" fill="none" stroke="#a87848" stroke-width="0.8" opacity="0.5"/>

  <!-- ── Nose ───────────────────────────────────────────────────────── -->
  <!-- Bridge -->
  <path d="M 178,172 L 174,196" fill="none" stroke="#a87848" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
  <!-- Nostrils -->
  <path d="M 170,200 Q 174,207 180,205 Q 186,207 190,200" fill="none" stroke="#a07040" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Nose tip shadow -->
  <ellipse cx="180" cy="200" rx="9" ry="5" fill="#b87040" opacity="0.2"/>

  <!-- ── Mouth ───────────────────────────────────────────────────────── -->
  <!-- Upper lip line -->
  <path d="M 165,215 Q 172,210 180,212 Q 188,210 195,215" fill="none" stroke="#905030" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Mouth line -->
  <path d="M 164,220 Q 180,228 196,220" fill="none" stroke="#905030" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Lower lip -->
  <path d="M 167,223 Q 180,230 193,223" fill="#b86848" opacity="0.35"/>

  <!-- ── Moustache ───────────────────────────────────────────────────── -->
  <path d="M 164,216 Q 170,209 180,211 Q 190,209 196,216 Q 188,220 180,218 Q 172,220 164,216 Z" fill="#2a1810"/>

  <!-- ── Beard (pointed, in the style of 1590s-1610s Reformed scholars) ── -->
  <path d="M 152,234 Q 149,246 152,258 Q 162,270 180,272 Q 198,270 208,258 Q 211,246 208,234 Q 200,240 180,242 Q 160,240 152,234 Z"
        fill="#2a1810"/>
  <!-- Beard fine lines for texture -->
  <path d="M 162,238 Q 168,255 172,268" fill="none" stroke="#3a2818" stroke-width="0.5" opacity="0.5"/>
  <path d="M 172,240 Q 176,258 178,271" fill="none" stroke="#3a2818" stroke-width="0.5" opacity="0.5"/>
  <path d="M 182,240 Q 184,258 182,271" fill="none" stroke="#3a2818" stroke-width="0.5" opacity="0.5"/>
  <path d="M 192,240 Q 188,256 185,268" fill="none" stroke="#3a2818" stroke-width="0.5" opacity="0.5"/>
  <!-- Beard highlight (subtle lighter edge) -->
  <path d="M 153,236 Q 150,248 153,260" fill="none" stroke="#4a3020" stroke-width="0.8" opacity="0.4"/>

  <!-- ── Cartouche / name-plate ─────────────────────────────────────── -->
  <!-- Cartouche outer rect -->
  <rect x="50" y="350" width="260" height="58" fill="#f0e8d8" stroke="#2a2a2a" stroke-width="1" rx="2"/>
  <!-- Cartouche inner ruled lines -->
  <line x1="54" y1="354" x2="306" y2="354" stroke="#c8b89e" stroke-width="0.4"/>
  <line x1="54" y1="404" x2="306" y2="404" stroke="#c8b89e" stroke-width="0.4"/>
  <!-- Cartouche thin inner rect -->
  <rect x="54" y="354" width="252" height="50" fill="none" stroke="#c8b89e" stroke-width="0.4" rx="1"/>
  <!-- Name text -->
  <text x="180" y="374"
    text-anchor="middle"
    font-family="'EB Garamond', 'Iowan Old Style', Georgia, serif"
    font-size="11.5"
    letter-spacing="0.07em"
    fill="#1a1208">BARTHALOMEOW KECKERMANN</text>
  <!-- Decorative divider -->
  <line x1="118" y1="381" x2="242" y2="381" stroke="#971b2f" stroke-width="0.6" opacity="0.7"/>
  <!-- Date range in Roman numerals -->
  <text x="180" y="395"
    text-anchor="middle"
    font-family="'Inter', -apple-system, sans-serif"
    font-size="8"
    font-weight="500"
    letter-spacing="0.15em"
    fill="#666">MDLXXII · MDCIX</text>

  <!-- ── Attribution footnote ───────────────────────────────────────── -->
  <text x="180" y="432"
    text-anchor="middle"
    font-family="'Inter', sans-serif"
    font-size="7"
    letter-spacing="0.05em"
    fill="#999"
    font-style="italic">Gymnasium Academicum, Gedani · Scholar and Systematist</text>

</svg>
