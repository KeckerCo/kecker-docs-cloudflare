<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="32" height="32" fill="#ffffff"/>
  <!--
    K mark — centered in 32×32 with balanced padding.
    Original mark bounding box: x=3–33, y=3–41 (30×38 in 40×44 viewBox).
    scale(0.72) → 21.6×27.36. translate(3.04, 0.16) centers it precisely.
  -->
  <g transform="translate(3.04, 0.16) scale(0.72)" fill="#111111">
    <rect x="3" y="3" width="5" height="38"/>
    <polygon points="8,14 8,17 33,3 27,3"/>
    <polygon points="8,18.5 8,21.5 27,41 33,41"/>
  </g>
</svg>
